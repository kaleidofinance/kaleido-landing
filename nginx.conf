worker_processes auto;
worker_rlimit_nofile 500000;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Optimization
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 650;
    keepalive_requests 100000;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffers
    client_body_buffer_size 256k;
    client_max_body_size 100m;
    client_header_buffer_size 2k;
    large_client_header_buffers 8 16k;
    output_buffers 4 64k;
    postpone_output 1460;

    # Timeouts
    client_header_timeout 120;
    client_body_timeout 120;
    send_timeout 120;

    # File handle caching
    open_file_cache max=500000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Compression
    gzip on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_comp_level 4;
    gzip_vary on;
    gzip_buffers 16 8k;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:100m rate=1000r/s;
    limit_conn_zone $binary_remote_addr zone=addr:100m;

    # Upstream for load balancing
    upstream kalaido_backend {
        least_conn;  # Use least connections algorithm
        server 127.0.0.1:3020;
        server 127.0.0.1:3021;
        server 127.0.0.1:3022;
        server 127.0.0.1:3023
        keepalive 32;  # Reduced keepalive connections
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name kaleidofinance.xyz www.kaleidofinance.xyz;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name kaleidofinance.xyz www.kaleidofinance.xyz;

        # SSL configuration
        ssl_certificate /etc/letsencrypt/live/kaleidofinance.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kaleidofinance.xyz/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Root directory and index
        root /home/kaleido/htdocs/kaleidofinance.xyz;
        index index.html;

        # Proxy settings
        location / {
            proxy_pass http://kalaido_backend;
            proxy_http_version 1.1;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_temp_file_write_size 256k;

            # Error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # Rate limiting
            limit_req zone=api_limit burst=500 nodelay;
            limit_conn addr 100;
        }

        # Static files handling
        location /_next/static/ {
            alias /home/kaleido/htdocs/kaleidofinance.xyz/.next/static/;
            expires 365d;
            access_log off;
        }

        location /static/ {
            alias /home/kaleido/htdocs/kaleidofinance.xyz/public/static/;
            expires 365d;
            access_log off;
        }

        # Cache static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Custom error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
